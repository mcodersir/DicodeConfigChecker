name: Build and release Dicode Config Checker v1.4.1

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dicode-v1-4-1-${{ github.ref }}
  cancel-in-progress: true

env:
  VERSION: 1.4.1
  ANDROID_LIB_COMMIT: ecf84ee82ac975c39852397351d1618a40df7cd2

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate desktop source and Android patches
        run: python -m py_compile engine.py app.py desktop.py scripts/patch_android_ui.py scripts/patch_android_v120.py scripts/patch_android_v120_imports.py scripts/patch_android_v130.py scripts/patch_android_v140.py scripts/patch_android_v141.py
      - name: Run parser regression tests
        run: |
          python -m pip install --upgrade pip pytest
          PYTHONPATH=. pytest -q tests

  windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build requirements
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-build.txt
      - name: Build Windows portable executable
        shell: pwsh
        run: |
          ./scripts/build_v140_windows.ps1
          Move-Item dist/DicodeConfigChecker.exe DicodeConfigChecker-v${{ env.VERSION }}-windows-x64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: DicodeConfigChecker-v${{ env.VERSION }}-windows-x64.exe
          if-no-files-found: error

  linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install runtime libraries and build requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt
      - name: Build Linux portable archive
        run: |
          python engine.py --download-xray-only
          test -x core/xray
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name DicodeConfigChecker --add-data assets:assets --add-binary core/xray:core --add-data core/geoip.dat:core --add-data core/geosite.dat:core desktop.py
          mkdir DicodeConfigChecker-v${VERSION}-linux-x86_64
          cp dist/DicodeConfigChecker README.md LICENSE DicodeConfigChecker-v${VERSION}-linux-x86_64/
          tar -czf DicodeConfigChecker-v${VERSION}-linux-x86_64.tar.gz DicodeConfigChecker-v${VERSION}-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: DicodeConfigChecker-v${{ env.VERSION }}-linux-x86_64.tar.gz
          if-no-files-found: error

  android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK and NDK
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-36' 'build-tools;36.0.0' 'platform-tools' 'ndk;29.0.14206865'
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> "$GITHUB_ENV"
      - name: Build Android Xray library
        run: |
          git clone https://github.com/2dust/AndroidLibXrayLite.git /tmp/AndroidLibXrayLite
          cd /tmp/AndroidLibXrayLite
          git checkout "$ANDROID_LIB_COMMIT"
          go install golang.org/x/mobile/cmd/gomobile@latest
          export PATH="$PATH:$(go env GOPATH)/bin"
          mkdir -p assets data
          bash gen_assets.sh download
          cp data/*.dat assets/
          gomobile init
          go mod tidy
          gomobile bind -v -androidapi 26 -trimpath -ldflags='-s -w -buildid= -checklinkname=0' ./
          mkdir -p "$GITHUB_WORKSPACE/android/app/libs"
          cp libv2ray.aar "$GITHUB_WORKSPACE/android/app/libs/libv2ray.aar"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'
      - name: Apply v1.4.1 Android UI and build installable APK
        run: |
          python scripts/patch_android_ui.py
          python scripts/patch_android_v120.py
          python scripts/patch_android_v120_imports.py
          python scripts/patch_android_v130.py
          python scripts/patch_android_v140.py
          python scripts/patch_android_v141.py
          gradle -p android :app:assembleDebug --stacktrace
          cp android/app/build/outputs/apk/debug/app-debug.apk DicodeConfigChecker-v${VERSION}-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: DicodeConfigChecker-v${{ env.VERSION }}-android.apk
          if-no-files-found: error

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [windows, linux, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Prepare source archive and checksums
        run: |
          git archive --format=zip --output release/DicodeConfigChecker-v${VERSION}-source.zip HEAD
          cd release
          sha256sum DicodeConfigChecker-* > SHA256SUMS.txt
      - name: Publish stable v1.4.1 release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete v${VERSION} --cleanup-tag --yes 2>/dev/null || true
          gh release create v${VERSION} release/* --title "Dicode Config Checker v${VERSION}" --notes-file RELEASE_NOTES_1.4.1.md --latest --target "$GITHUB_SHA"
