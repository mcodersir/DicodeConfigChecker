name: Build Dicode Config Checker v1.4.0 Stable

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dicode-v1.4.0-${{ github.ref }}
  cancel-in-progress: true

env:
  VERSION: 1.4.0
  ANDROID_LIB_COMMIT: ecf84ee82ac975c39852397351d1618a40