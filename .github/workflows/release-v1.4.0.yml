name: Build Dicode Config Checker v1.4.0 Stable

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dicode-v1.4.0-${{ github.ref }}
  cancel-in-progress: true

env:
  VERSION: 1.4.0
  ANDROID_LIB_COMMIT: ecf84ee82ac975c39852397351d1618a40df7cd2

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements-build.txt
      - run: |
          python engine.py --download-xray-only
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name DicodeConfigChecker --icon assets/app.ico --add-data assets;assets --add-binary core/xray.exe;core desktop.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/DicodeConfigChecker.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements-build.txt
      - run: |
          python engine.py --download-xray-only
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name DicodeConfigChecker desktop.py
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/DicodeConfigChecker

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
      - uses: android-actions/setup-android@v3
      - run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-36' 'build-tools;36.0.0' 'platform-tools' 'ndk;29.0.14206865'
      - run: |
          git clone https://github.com/2dust/AndroidLibXrayLite.git /tmp/AndroidLibXrayLite
          cd /tmp/AndroidLibXrayLite
          git checkout $ANDROID_LIB_COMMIT
          go install golang.org/x/mobile/cmd/gomobile@latest
          export PATH="$PATH:$(go env GOPATH)/bin"
          gomobile init
          go mod tidy
          gomobile bind -androidapi 26 ./
          cp libv2ray.aar $GITHUB_WORKSPACE/android/app/libs/libv2ray.aar
      - uses: gradle/actions/setup-gradle@v4
      - run: python scripts/patch_android_v140.py && gradle -p android :app:assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: android/app/build/outputs/apk/debug/app-debug.apk

  release:
    needs: [windows, linux, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release
      - name: Publish stable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete v1.4.0 --cleanup-tag --yes 2>/dev/null || true
          gh release create v1.4.0 release/** --title 'Dicode Config Checker v1.4.0 Stable' --notes 'Stable multiplatform release: Android APK, Windows EXE and Linux build. Redesigned home dashboard, smart stage actions, minimal icon buttons and improved UX.'
