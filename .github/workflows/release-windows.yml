name: Legacy v1.0.1 Windows Builder

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-v1-0-1:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v1.0.1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -r requirements-build.txt
      - name: Build legacy executable only
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name DicodeConfigChecker --icon assets\app.ico --add-data "assets;assets" app.py
      - uses: actions/upload-artifact@v4
        with:
          name: DicodeConfigChecker-v1.0.1-windows-legacy
          path: dist/DicodeConfigChecker.exe

# This workflow intentionally never deletes, edits, or recreates the existing
# v1.0.1 release. Multiplatform previews are handled by release-v1.1.0.yml.
