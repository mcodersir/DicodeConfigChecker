name: Build v1.1.0 Multiplatform Preview

on:
  push:
    branches:
      - main
      - agent/v1.1.0-multiplatform-preview
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest
      - run: python -m py_compile engine.py app.py desktop.py
      - run: pytest -q tests

  windows:
    needs: tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements-build.txt
      - name: Prepare Xray
        shell: pwsh
        run: |
          python engine.py --download-xray-only
          if ($LASTEXITCODE -ne 0) { Write-Warning "Xray download skipped" }
      - name: Build Windows
        shell: pwsh
        run: |
          $args = @('-m','PyInstaller','--noconfirm','--clean','--onefile','--windowed','--name','DicodeConfigChecker','--icon','assets\app.ico','--add-data','assets;assets')
          if (Test-Path 'core\xray.exe') { $args += @('--add-binary','core\xray.exe;core') }
          $args += @('desktop.py')
          python @args
          Move-Item dist\DicodeConfigChecker.exe DicodeConfigChecker-v1.1.0-windows.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: DicodeConfigChecker-v1.1.0-windows.exe

  linux:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Qt runtime libraries
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0
      - run: pip install -r requirements-build.txt
      - name: Prepare Xray
        run: python engine.py --download-xray-only || true
      - name: Build Linux
        run: |
          args=(--noconfirm --clean --onefile --windowed --name DicodeConfigChecker --add-data assets:assets)
          if [ -f core/xray ]; then args+=(--add-binary core/xray:core); fi
          python -m PyInstaller "${args[@]}" desktop.py
          mkdir DicodeConfigChecker-v1.1.0-linux-x86_64
          cp dist/DicodeConfigChecker DicodeConfigChecker-v1.1.0-linux-x86_64/
          cp README.md LICENSE DicodeConfigChecker-v1.1.0-linux-x86_64/
          tar -czf DicodeConfigChecker-v1.1.0-linux-x86_64.tar.gz DicodeConfigChecker-v1.1.0-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: DicodeConfigChecker-v1.1.0-linux-x86_64.tar.gz

  android:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager 'platforms;android-36' 'build-tools;36.0.0'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'
      - name: Build Android APK
        run: |
          gradle -p android :app:assembleDebug --stacktrace
          cp android/app/build/outputs/apk/debug/app-debug.apk DicodeConfigChecker-v1.1.0-android-preview.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: DicodeConfigChecker-v1.1.0-android-preview.apk

  prerelease:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/agent/v1.1.0-multiplatform-preview')
    needs: [windows, linux, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Prepare source and checksums
        run: |
          git archive --format=zip --output release/DicodeConfigChecker-source-v1.1.0.zip HEAD
          cd release
          sha256sum DicodeConfigChecker-* > SHA256SUMS.txt
      - name: Publish prerelease without touching v1.0.1
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view v1.1.0 >/dev/null 2>&1 && gh release delete v1.1.0 --yes || true
          gh release create v1.1.0 release/* \
            --title 'Dicode Config Checker v1.1.0 Preview' \
            --notes-file RELEASE_NOTES_1.1.0.md \
            --target '${{ github.sha }}' \
            --prerelease
