name: Build v1.1.0 Complete Multiplatform Preview

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dicode-v1.1.0-${{ github.ref }}
  cancel-in-progress: true

env:
  VERSION: 1.1.0
  ANDROID_LIB_COMMIT: ecf84ee82ac975c39852397351d1618a40df7cd2

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate Python sources
        run: python -m py_compile engine.py app.py desktop.py scripts/patch_android_ui.py
      - name: Run regression tests
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip pytest
          pytest -q tests

  windows:
    needs: tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build requirements
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-build.txt
      - name: Download required Windows Xray core
        shell: pwsh
        run: |
          python engine.py --download-xray-only
          if (-not (Test-Path 'core\xray.exe')) { throw 'Windows Xray core was not downloaded.' }
          if (-not (Test-Path 'core\geoip.dat')) { throw 'geoip.dat is missing.' }
          if (-not (Test-Path 'core\geosite.dat')) { throw 'geosite.dat is missing.' }
          & 'core\xray.exe' version
      - name: Build Windows with icon and bundled Xray
        shell: pwsh
        run: |
          $icon = (Resolve-Path 'assets\app.ico').Path
          $args = @(
            '-m','PyInstaller','--noconfirm','--clean','--onefile','--windowed',
            '--name','DicodeConfigChecker','--icon',$icon,
            '--add-data','assets;assets',
            '--add-binary','core\xray.exe;core',
            '--add-data','core\geoip.dat;core',
            '--add-data','core\geosite.dat;core',
            'desktop.py'
          )
          python @args
          if (-not (Test-Path 'dist\DicodeConfigChecker.exe')) { throw 'Windows EXE was not created.' }
          Move-Item 'dist\DicodeConfigChecker.exe' 'DicodeConfigChecker-v1.1.0-windows.exe'
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: DicodeConfigChecker-v1.1.0-windows.exe
          if-no-files-found: error

  linux:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Qt runtime libraries
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0
      - name: Install build requirements
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-build.txt
      - name: Download required Linux Xray core
        run: |
          python engine.py --download-xray-only
          test -x core/xray
          test -f core/geoip.dat
          test -f core/geosite.dat
          core/xray version
      - name: Build Linux with bundled Xray
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --windowed \
            --name DicodeConfigChecker \
            --add-data assets:assets \
            --add-binary core/xray:core \
            --add-data core/geoip.dat:core \
            --add-data core/geosite.dat:core \
            desktop.py
          test -x dist/DicodeConfigChecker
          mkdir DicodeConfigChecker-v1.1.0-linux-x86_64
          cp dist/DicodeConfigChecker README.md LICENSE DicodeConfigChecker-v1.1.0-linux-x86_64/
          tar -czf DicodeConfigChecker-v1.1.0-linux-x86_64.tar.gz DicodeConfigChecker-v1.1.0-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: DicodeConfigChecker-v1.1.0-linux-x86_64.tar.gz
          if-no-files-found: error

  android:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK and NDK
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-36' 'build-tools;36.0.0' 'platform-tools' 'ndk;29.0.14206865'
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> "$GITHUB_ENV"
      - name: Build and embed Android Xray core AAR
        run: |
          git clone https://github.com/2dust/AndroidLibXrayLite.git /tmp/AndroidLibXrayLite
          cd /tmp/AndroidLibXrayLite
          git checkout "$ANDROID_LIB_COMMIT"
          go install golang.org/x/mobile/cmd/gomobile@latest
          export PATH="$PATH:$(go env GOPATH)/bin"
          mkdir -p assets data
          bash gen_assets.sh download
          cp -v data/*.dat assets/
          gomobile init
          go mod tidy
          gomobile bind -v -androidapi 26 -trimpath -ldflags='-s -w -buildid= -checklinkname=0' ./
          mkdir -p "$GITHUB_WORKSPACE/android/app/libs"
          cp libv2ray.aar "$GITHUB_WORKSPACE/android/app/libs/libv2ray.aar"
          test -s "$GITHUB_WORKSPACE/android/app/libs/libv2ray.aar"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'
      - name: Apply responsive minimal Android UI
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('scripts/patch_android_ui.py')
          s = p.read_text(encoding='utf-8')
          s = s.replace('re.subn(pattern, replacement, text, count=1, flags=re.S)', 're.subn(pattern, lambda _match: replacement, text, count=1, flags=re.S)')
          p.write_text(s, encoding='utf-8')
          PY
          python scripts/patch_android_ui.py
          grep -q 'statusBarsPadding()' android/app/src/main/java/ir/dicode/configchecker/MainActivity.kt
          grep -q 'navigationBarsPadding()' android/app/src/main/java/ir/dicode/configchecker/MainActivity.kt
          grep -q 'pingWorkers' android/app/src/main/java/ir/dicode/configchecker/MainActivity.kt
          grep -q 'DefaultChannels' android/app/src/main/java/ir/dicode/configchecker/MainActivity.kt
      - name: Build Android APK with Xray core
        run: |
          gradle -p android :app:assembleDebug --stacktrace
          test -f android/app/build/outputs/apk/debug/app-debug.apk
          cp android/app/build/outputs/apk/debug/app-debug.apk DicodeConfigChecker-v1.1.0-android-preview.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: DicodeConfigChecker-v1.1.0-android-preview.apk
          if-no-files-found: error

  prerelease:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [windows, linux, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Prepare source and checksums
        run: |
          git archive --format=zip --output release/DicodeConfigChecker-source-v1.1.0.zip HEAD
          cd release
          sha256sum DicodeConfigChecker-* > SHA256SUMS.txt
          ls -lah
      - name: Replace v1.1.0 prerelease without touching v1.0.1
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete v1.1.0 --cleanup-tag --yes 2>/dev/null || true
          gh release create v1.1.0 release/* \
            --title 'Dicode Config Checker v1.1.0 Android Performance Update' \
            --notes-file RELEASE_NOTES_1.1.0.md \
            --target '${{ github.sha }}' \
            --prerelease
