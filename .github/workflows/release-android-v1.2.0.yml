name: Build Android v1.2.0 Preview

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  ANDROID_LIB_COMMIT: ecf84ee82ac975c39852397351d1618a40df7cd2

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate patch scripts